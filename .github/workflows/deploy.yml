name: Build & Deploy

on:
  push:
    branches: [main, uat]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kaungsettshinnaing/retail-app

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "ENV_TAG=uat" >> $GITHUB_OUTPUT
          fi
          echo "SHA_TAG=$SHA" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.ENV_TAG }}
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.SHA_TAG }}

  # ─── Deploy prod (main) ───────────────────────────────────────────────────
  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' && vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: SSH deploy to prod
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/retail-app

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u kaungsettshinnaing --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  # ─── Deploy UAT (uat) ─────────────────────────────────────────────────────
  deploy-uat:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'uat' && vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: SSH deploy to UAT
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/retail-app-uat

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u kaungsettshinnaing --password-stdin

            docker compose -f docker-compose.uat.yml --project-name retail-uat --env-file .env.uat pull
            docker compose -f docker-compose.uat.yml --project-name retail-uat --env-file .env.uat up -d --remove-orphans
            docker image prune -f
